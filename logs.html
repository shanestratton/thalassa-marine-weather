<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#0f172a" />
        <meta name="description" content="Live voyage log — follow the passage at sea." />
        <title>Voyage Log — Thalassa</title>
        <link rel="stylesheet" href="/index.css" />
        <style>
            /* AIS popup — strip Mapbox's default white shell so the dark
               glass card inside is what shows. */
            .voyage-log-ais-popup .mapboxgl-popup-content {
                background: transparent;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
            }
            .voyage-log-ais-popup .mapboxgl-popup-tip {
                border-top-color: rgb(15 23 42);
                border-bottom-color: rgb(15 23 42);
                border-left-color: rgb(15 23 42);
                border-right-color: rgb(15 23 42);
            }
            /* Lift the satellite basemap out of "goth" — affects only the
               raster canvas, not markers/popups/labels (those are HTML). */
            .voyage-log-sat-bright .mapboxgl-canvas {
                filter: brightness(1.18) saturate(1.12) contrast(1.02);
            }
            /* Clean public canvas — hide the Mapbox logo + attribution bar
               (owner ask 2026-07-05). attributionControl is also off on the
               map; this covers the always-present logo. */
            .mapboxgl-ctrl-logo,
            .mapboxgl-ctrl-attrib {
                display: none !important;
            }
        </style>
    </head>
    <body class="bg-slate-900">
        <div id="root"></div>
        <script type="module" src="/src/logs-main.tsx"></script>
    </body>
</html>
