<!doctype html>
<!--
  writingsuggestions="false" + autocomplete="off" on <html> disables
  iOS 18.1+ Apple Writing Tools (the "Show Writing Tools" popover
  that appears over text inputs after long-press / context menu).
  The attribute is a global HTML hint that cascades through the
  document tree, so this single anchor turns it off everywhere
  without needing to mark every input/textarea individually.
-->
<html lang="en" writingsuggestions="false" autocomplete="off">
    <head>
        <meta charset="UTF-8" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="Thalassa" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#0f172a" />
        <!-- Content Security Policy — restrict external sources -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://esm.sh;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https: http:;
      connect-src 'self' data: http: https://*.supabase.co wss://*.supabase.co https://*.open-meteo.com https://api.stormglass.io https://api.mapbox.com https://events.mapbox.com https://tiles.openseamap.org https://tile.openweathermap.org https://server.arcgisonline.com https://*.arcgis.com https://api.rainviewer.com https://tilecache.rainviewer.com https://nominatim.openstreetmap.org https://generativelanguage.googleapis.com https://weatherkit.apple.com https://*.weatherkit.apple.com https://*.sentry.io https://*.tile.openstreetmap.org https://fonts.googleapis.com https://fonts.gstatic.com https://cdn-icons-png.flaticon.com https://*.noaa.gov https://api.knackwx.com https://*.maptiler.com https://realearth.ssec.wisc.edu https://gibs.earthdata.nasa.gov https://services.geoplatform.gov https://cdn.jsdelivr.net https://mesonet.agron.iastate.edu https://nowcoast.noaa.gov https://api.spoonacular.com https://img.spoonacular.com wss://*.blitzortung.org:* https://api.deepgram.com wss://api.deepgram.com https://*.workers.dev wss://*.workers.dev https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://gmail.googleapis.com ;
      media-src 'self' blob: data:;
      worker-src 'self' blob:;
      frame-src 'none';
      frame-ancestors 'none';
      base-uri 'self';"
        />
        <link rel="manifest" href="/manifest.json" />
        <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/567/567055.png" />

        <link rel="preconnect" href="https://images.unsplash.com" />
        <link rel="preconnect" href="https://api.open-meteo.com" />
        <link rel="preconnect" href="https://api.stormglass.io" />

            rel="stylesheet"
        />
        <link rel="preconnect" href="https://tiles.openseamap.org" />

        <title>Thalassa — Marine Weather & Passage Planning</title>
        <meta
            name="description"
            content="Professional marine weather intelligence for sailors. Real-time wind, waves, tides, weather-routed passage planning, GPS tracking, and anchor watch. Built for blue water cruisers."
        />
        <meta name="robots" content="index, follow" />

        <!-- Open Graph -->
        <meta property="og:title" content="Thalassa — Marine Weather & Passage Planning" />
        <meta
            property="og:description"
            content="Professional marine weather intelligence. Real-time wind, waves, tides, and weather-routed passage planning for sailors."
        />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/567/567055.png" />

        <style>
            /* Custom scrollbar for glassmorphism feel */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 10px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.4);
            }

            body {
                background-color: #0f172a;
                color: white;
                overscroll-behavior-y: none;
                /* Prevents rubber-banding on iOS */
                -webkit-tap-highlight-color: transparent;
            }

            /* Prevent iOS input zoom */
            input,
            select,
            textarea {
                font-size: 16px !important;
            }

            /* Leaflet dark mode overrides */
            .leaflet-container {
                background: #0f172a;
                font-family: inherit;
            }

            /* High Contrast Tiles for Visibility */
            .high-contrast-tiles {
                filter: contrast(1.3) brightness(0.7) invert(0);
            }

            .leaflet-popup-content-wrapper,
            .leaflet-popup-tip {
                background: rgba(15, 23, 42, 0.9);
                backdrop-filter: blur(10px);
                color: white;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .leaflet-popup-content {
                margin: 10px;
            }

            .leaflet-bar a {
                background-color: rgba(15, 23, 42, 0.8);
                color: white;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .leaflet-bar a:hover {
                background-color: rgba(30, 41, 59, 1);
                color: #38bdf8;
            }

            /* Pulse animation for the boat */
            @keyframes pulse-ring {
                0% {
                    transform: scale(0.8);
                    opacity: 0.5;
                }

                100% {
                    transform: scale(2.5);
                    opacity: 0;
                }
            }

            .boat-pulse {
                position: absolute;
                width: 20px;
                height: 20px;
                background: rgba(56, 189, 248, 0.6);
                border-radius: 50%;
                animation: pulse-ring 2s infinite;
            }

            /* Hero band shake — fires when anchorStatus is "alarm".
               Brief left-right wobble draws the eye + signals urgency
               without being so violent that the user can't read the
               radius/coords. 4 cycles, 0.5s each, infinite while
               alarm holds. Pairs with the red border pulse on the
               same element. */
            @keyframes nav-hero-shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                15% {
                    transform: translateX(-3px);
                }
                30% {
                    transform: translateX(3px);
                }
                45% {
                    transform: translateX(-2px);
                }
                60% {
                    transform: translateX(2px);
                }
                75% {
                    transform: translateX(-1px);
                }
            }
            .nav-hero-alarm {
                animation: nav-hero-shake 0.6s ease-in-out infinite;
                border-color: rgba(239, 68, 68, 0.5) !important;
                box-shadow: 0 0 16px rgba(239, 68, 68, 0.25);
            }
        </style>
        <!-- Importmap: runtime dependencies only, pinned to exact versions -->
        <script type="importmap">

                    "@dnd-kit/utilities": "https://esm.sh/@dnd-kit/utilities@3.2.2",
                    "path": "https://esm.sh/path@0.12.7",
                    "zod": "https://esm.sh/zod@3.22.4",
                    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.88.0",
                    "@capacitor/core": "https://esm.sh/@capacitor/core@8.0.0",
                    "@capacitor/cli": "https://esm.sh/@capacitor/cli@8.0.0",
                    "@capacitor/haptics": "https://esm.sh/@capacitor/haptics@8.0.0",
                    "url": "https://esm.sh/url@0.11.4"
                }
            }
        </script>
        <link rel="stylesheet" href="/index.css" />
    </head>

    <body>
        <!-- Skip-to-content link for keyboard/screen reader users (WCAG 2.1) -->
        <a
            href="#main-content"
            class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[10000] focus:bg-sky-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:text-sm focus:font-bold focus:shadow-xl"
        >
            Skip to main content
        </a>
        <div id="root"></div>
        <!-- iOS WKWebView: Suppress harmless "readonly property" TypeError during scroll events.
       React 18's event delegation sets cancelBubble/returnValue on native events, which are
       readonly in WebKit for scroll/touch events. The scroll still works; this just silences
       the console error that fires on every scroll gesture.
       Security: Only suppresses TypeError, logs breadcrumbs, alerts on excessive count. -->
        <script>
            (function () {
                var readonlySuppressCount = 0;
                window.addEventListener('error', function (e) {
                    if (e.error instanceof TypeError && e.message && e.message.indexOf('readonly property') !== -1) {
                        readonlySuppressCount++;
                        if (readonlySuppressCount <= 5 || readonlySuppressCount % 100 === 0) {
                            console.debug(
                                '[SecurityGuard] Suppressed iOS readonly TypeError #' + readonlySuppressCount,
                            );
                        }
                        if (readonlySuppressCount === 100) {
                            console.warn(
                                '[SecurityGuard] 100+ readonly TypeErrors suppressed this session — investigate.',
                            );
                        }
                        e.preventDefault();
                        e.stopPropagation();
                        return true;
                    }
                });
            })();
        </script>
        <!-- Apple Writing Tools (iOS 18.1+) suppression — belt &
             suspenders. The `writingsuggestions="false"` attribute
             on <html> cascades to descendants, but some component
             libraries explicitly set the attribute back to "true" or
             create inputs that re-opt-in. Mark every text input +
             textarea + contenteditable on creation so the popover
             never fires anywhere in the app. -->
        <script>
            (function () {
                function suppressOn(el) {
                    if (!el || !el.setAttribute) return;
                    var tag = el.tagName;
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable) {
                        el.setAttribute('writingsuggestions', 'false');
                        // autocorrect=off also softens iOS Writing Tools triggers
                        // for non-form-fill text fields like our search box.
                        if (!el.hasAttribute('autocorrect')) {
                            el.setAttribute('autocorrect', 'off');
                        }
                    }
                }
                // Cover anything already in the DOM at boot.
                document.addEventListener('DOMContentLoaded', function () {
                    document.querySelectorAll('input, textarea, [contenteditable]').forEach(suppressOn);
                });
                // Cover anything React/Capacitor mounts later.
                var mo = new MutationObserver(function (records) {
                    records.forEach(function (r) {
                        r.addedNodes.forEach(function (n) {
                            if (n.nodeType !== 1) return;
                            suppressOn(n);
                            if (n.querySelectorAll) {
                                n.querySelectorAll('input, textarea, [contenteditable]').forEach(suppressOn);
                            }
                        });
                    });
                });
                mo.observe(document.documentElement, { childList: true, subtree: true });
            })();
        </script>
        <script type="module" src="/index.tsx"></script>
    </body>
</html>
