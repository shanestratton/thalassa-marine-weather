name: LINZ MSI → Supabase

# Maritime NZ's navigational warnings page is gated by Cloudflare's JS
# challenge, which Deno fetch (Supabase edge functions) can't solve.
# This workflow runs Playwright in headless Chromium — which Cloudflare
# lets through — every 6 hours and writes the parsed warnings to the
# linz_warnings table. The proxy-linz-msi edge function then serves
# them in the same shape as the AMSA / UKHO proxies.

on:
    schedule:
        # Every 6 hours at HH:17 (offset to avoid the on-the-hour
        # GitHub-wide cron stampede).
        - cron: '17 */6 * * *'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    scrape:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # Don't run on PR forks — secrets aren't available there and
        # the job would just no-op-fail. master + manual only.
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
        defaults:
            run:
                working-directory: scripts/linz-msi-scrape
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v7
              with:
                  # Node 22+ for the native WebSocket implementation —
                  # supabase-js v2 initialises its Realtime transport on
                  # createClient() and errors out on Node 20 without it.
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: scripts/linz-msi-scrape/package.json

            - name: Install scraper deps
              run: npm install --no-audit --no-fund

            - name: Install Chromium for Playwright
              # --with-deps installs the OS-level libs (libnss3 et al.)
              # that headless Chromium needs on Ubuntu.
              run: npx playwright install chromium --with-deps

            - name: Scrape Maritime NZ and upsert to Supabase
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
              run: node scrape.mjs

            - name: Upload page state on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: linz-msi-debug-${{ github.run_id }}
                  path: /tmp/linz-debug/
                  if-no-files-found: ignore
                  retention-days: 7
