name: CI

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    check:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Dependency audit (critical = fail)
              run: npm audit --audit-level=critical

            - name: Dependency audit (high = warn)
              run: npm audit --audit-level=high || echo "::warning::High-severity vulnerabilities found — run npm audit for details"

            - name: Lint
              run: npx eslint . --max-warnings 0

            - name: TypeScript type check
              run: npx tsc --noEmit

            - name: Run unit tests with coverage
              run: npx vitest run --reporter=verbose --coverage

            - name: Build
              run: npx vite build

            - name: Bundle size check
              run: |
                  BUNDLE_SIZE=$(du -sk dist/ | cut -f1)
                  echo "::notice::Bundle size: ${BUNDLE_SIZE}KB"
                  if [ "$BUNDLE_SIZE" -gt 5120 ]; then
                    echo "::error::Bundle size ${BUNDLE_SIZE}KB exceeds 5MB limit"
                    exit 1
                  fi

            - name: Lighthouse CI
              run: |
                  npm install -g @lhci/cli@0.14.x
                  lhci autorun --config=lighthouserc.json

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run E2E tests
              run: npx playwright test --project=chromium --reporter=list

            - name: Upload E2E artifacts on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      playwright-report/
                      test-results/
                  retention-days: 7

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 30
