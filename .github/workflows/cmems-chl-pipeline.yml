name: CMEMS Chlorophyll → GitHub Release

on:
    schedule:
        - cron: '0 16 * * *' # 1h after SST — BGC publishes slightly later
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
                  cache: 'pip'
                  cache-dependency-path: scripts/cmems-chl-pipeline/requirements.txt

            - name: Install pipeline deps
              run: |
                  pip install -r scripts/cmems-chl-pipeline/requirements.txt

            - name: Run pipeline
              env:
                  COPERNICUS_MARINE_USERNAME: ${{ secrets.COPERNICUS_MARINE_USERNAME }}
                  COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUS_MARINE_PASSWORD }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
              run: python scripts/cmems-chl-pipeline/pipeline.py

            - name: Upload NetCDF artifact on failure (for debugging)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: cmems-chl-debug-${{ github.run_id }}
                  path: /tmp/cmems-chl/
                  if-no-files-found: ignore
                  retention-days: 7
