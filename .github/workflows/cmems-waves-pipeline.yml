name: CMEMS Waves → GitHub Release

# Refresh the ocean-waves binary files daily. CMEMS WAV global forecast
# publishes at ~05:00 UTC (same as currents); we pull at 07:00 UTC so
# the 06:00 slot is available.
on:
    schedule:
        - cron: '0 7 * * *'
    workflow_dispatch:

permissions:
    contents: write # create/update releases

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
                  cache: 'pip'
                  cache-dependency-path: scripts/cmems-waves-pipeline/requirements.txt

            - name: Install pipeline deps
              run: |
                  pip install -r scripts/cmems-waves-pipeline/requirements.txt

            - name: Run pipeline
              env:
                  COPERNICUS_MARINE_USERNAME: ${{ secrets.COPERNICUS_MARINE_USERNAME }}
                  COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUS_MARINE_PASSWORD }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
              run: python scripts/cmems-waves-pipeline/pipeline.py

            - name: Upload NetCDF artifact on failure (for debugging)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: cmems-waves-debug-${{ github.run_id }}
                  path: /tmp/cmems-waves/
                  if-no-files-found: ignore
                  retention-days: 7
